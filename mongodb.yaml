- name: setup mongodb server
  hosts: mongodb
  become: yes
  tasks:
  - name: copying mongodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: installing mongodb server
    ansible.builtin.package:
    name: mongodb-org
    state: present

  - name: allowing remote connections
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: start and enabling service
    ansible.builtin.service:
    name: mongod 
    state: started
    enabled: yes

